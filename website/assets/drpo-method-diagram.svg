<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">DrPO method overview</title>
  <desc id="desc">A three-stage overview of DrPO: sample and rank on-policy candidates, construct preference and reference fields in a frozen feature space, then regress toward a detached target.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0 0 L10 5 L0 10 Z" fill="#d97706"/>
    </marker>
    <linearGradient id="sample-blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="sample-green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="sample-red" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/>
      <stop offset="1" stop-color="#fca5a5"/>
    </linearGradient>
    <linearGradient id="sample-slate" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-14%" width="124%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .stage { fill: #ffffff; stroke: #dbe2e6; stroke-width: 1.5; filter: url(#shadow); }
      .soft { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.3; }
      .blue-card { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.2; }
      .green-card { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.2; }
      .red-card { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.2; }
      .slate-card { fill: #f8fafc; stroke: #64748b; stroke-width: 2.1; }
      .purple-card { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.2; }
      .amber-card { fill: #fffbeb; stroke: #d97706; stroke-width: 2.2; }
      .stage-title { fill: #0f172a; font-family: Arial, sans-serif; font-size: 24px; font-weight: 800; }
      .label { fill: #0f172a; font-family: Arial, sans-serif; font-size: 18px; font-weight: 800; }
      .small { fill: #64748b; font-family: Arial, sans-serif; font-size: 14px; font-weight: 650; }
      .tiny { fill: #64748b; font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .8px; }
      .math { fill: #0f172a; font-family: Georgia, serif; font-size: 22px; font-style: italic; }
      .math-small { fill: #0f172a; font-family: Georgia, serif; font-size: 17px; font-style: italic; }
      .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 3.2; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #16a34a; stroke-width: 3.2; marker-end: url(#arrow-green); }
      .arrow-slate { fill: none; stroke: #64748b; stroke-width: 2.8; marker-end: url(#arrow-slate); }
      .arrow-amber { fill: none; stroke: #d97706; stroke-width: 3.2; marker-end: url(#arrow-amber); }
      .dashed { stroke-dasharray: 8 8; }
      .dot-green { fill: #16a34a; opacity: .8; }
      .dot-red { fill: #dc2626; opacity: .78; }
      .dot-slate { fill: #64748b; opacity: .62; }
      .dot-blue { fill: #2563eb; opacity: .55; }
      .thumb { stroke: #ffffff; stroke-width: 2; }
    </style>
  </defs>

  <rect class="page" width="1440" height="760" rx="28"/>

  <rect class="stage" x="44" y="54" width="402" height="624" rx="28"/>
  <rect class="stage" x="514" y="54" width="412" height="624" rx="28"/>
  <rect class="stage" x="994" y="54" width="402" height="624" rx="28"/>

  <text class="tiny" x="82" y="98">STAGE 1</text>
  <text class="stage-title" x="82" y="132">Sample and rank</text>
  <text class="small" x="82" y="158">Generate candidates from the current one-step model.</text>

  <rect class="blue-card" x="82" y="194" width="130" height="68" rx="16"/>
  <text class="label" x="147" y="224" text-anchor="middle">Prompts</text>
  <text class="small" x="147" y="247" text-anchor="middle">+ seeds</text>

  <rect class="blue-card" x="258" y="198" width="104" height="60" rx="16"/>
  <text class="math" x="310" y="235" text-anchor="middle">G<tspan baseline-shift="sub" font-size="14">θ</tspan></text>

  <path class="arrow-blue" d="M212 228 L250 228"/>

  <rect class="soft" x="82" y="304" width="280" height="118" rx="18"/>
  <text class="label" x="112" y="337">Candidate set</text>
  <g transform="translate(111 356)">
    <rect class="thumb" width="52" height="48" rx="9" fill="url(#sample-blue)"/>
    <rect class="thumb" x="64" width="52" height="48" rx="9" fill="url(#sample-blue)"/>
    <rect class="thumb" x="128" width="52" height="48" rx="9" fill="url(#sample-blue)"/>
    <rect class="thumb" x="192" width="52" height="48" rx="9" fill="url(#sample-blue)"/>
  </g>
  <text class="math-small" x="341" y="402" text-anchor="middle">x</text>

  <path class="arrow-blue" d="M310 258 C310 284 250 292 230 304"/>

  <rect class="slate-card" x="82" y="464" width="132" height="74" rx="16"/>
  <text class="label" x="148" y="493" text-anchor="middle">Reward</text>
  <text class="math" x="148" y="522" text-anchor="middle">S(y)</text>

  <rect class="green-card" x="246" y="446" width="116" height="52" rx="15"/>
  <text class="label" x="304" y="478" text-anchor="middle">y<tspan baseline-shift="super" font-size="13">+</tspan></text>

  <rect class="red-card" x="246" y="522" width="116" height="52" rx="15"/>
  <text class="label" x="304" y="554" text-anchor="middle">y<tspan baseline-shift="super" font-size="13">−</tspan></text>

  <path class="arrow-slate" d="M214 500 L238 474"/>
  <path class="arrow-slate" d="M214 506 L238 546"/>

  <text class="tiny" x="82" y="608">REFERENCE SAMPLES</text>
  <rect class="slate-card" x="82" y="626" width="84" height="42" rx="12"/>
  <text class="math-small" x="124" y="652" text-anchor="middle">G<tspan baseline-shift="sub" font-size="11">ref</tspan></text>
  <g transform="translate(188 624)">
    <rect class="thumb" width="42" height="42" rx="8" fill="url(#sample-slate)"/>
    <rect class="thumb" x="52" width="42" height="42" rx="8" fill="url(#sample-slate)"/>
    <rect class="thumb" x="104" width="42" height="42" rx="8" fill="url(#sample-slate)"/>
  </g>
  <path class="arrow-slate dashed" d="M166 647 L182 647"/>

  <text class="tiny" x="552" y="98">STAGE 2</text>
  <text class="stage-title" x="552" y="132">Build a drifting field</text>
  <text class="small" x="552" y="158">Embed positive, negative, and reference samples once.</text>

  <rect class="purple-card" x="552" y="198" width="336" height="292" rx="28"/>
  <text class="label" x="720" y="236" text-anchor="middle">Frozen feature space</text>
  <text class="math" x="720" y="266" text-anchor="middle">φ(·)</text>

  <ellipse cx="720" cy="352" rx="118" ry="74" fill="#ffffff" stroke="#d8b4fe" stroke-width="1.5"/>
  <path d="M625 374 C660 318 735 306 814 338" fill="none" stroke="#bfdbfe" stroke-width="2"/>
  <path d="M628 391 C672 356 746 348 818 386" fill="none" stroke="#bbf7d0" stroke-width="2"/>
  <path d="M640 326 C684 386 748 402 805 344" fill="none" stroke="#fecaca" stroke-width="2"/>

  <circle class="dot-green" cx="681" cy="326" r="8"/>
  <circle class="dot-green" cx="710" cy="309" r="7"/>
  <circle class="dot-green" cx="756" cy="326" r="8"/>
  <circle class="dot-red" cx="662" cy="389" r="8"/>
  <circle class="dot-red" cx="722" cy="407" r="7"/>
  <circle class="dot-red" cx="785" cy="386" r="8"/>
  <circle class="dot-slate" cx="686" cy="365" r="7"/>
  <circle class="dot-slate" cx="742" cy="362" r="7"/>
  <circle class="dot-slate" cx="772" cy="350" r="6"/>
  <circle class="dot-blue" cx="720" cy="351" r="9"/>

  <path class="arrow-green" d="M705 352 L769 318"/>
  <path class="arrow-slate dashed" d="M705 352 L654 383"/>
  <text class="small" x="785" y="315">V<tspan baseline-shift="sub" font-size="10">pref</tspan></text>
  <text class="small" x="592" y="390">V<tspan baseline-shift="sub" font-size="10">ref</tspan></text>

  <rect class="green-card" x="552" y="530" width="150" height="60" rx="16"/>
  <text class="label" x="627" y="555" text-anchor="middle">Preference</text>
  <text class="small" x="627" y="577" text-anchor="middle">positive minus negative</text>

  <rect class="slate-card" x="738" y="530" width="150" height="60" rx="16"/>
  <text class="label" x="813" y="555" text-anchor="middle">Reference</text>
  <text class="small" x="813" y="577" text-anchor="middle">drift to base prior</text>

  <path class="arrow-green" d="M702 530 C700 498 698 476 690 438"/>
  <path class="arrow-slate dashed" d="M808 530 C804 496 786 470 760 432"/>

  <text class="tiny" x="1032" y="98">STAGE 3</text>
  <text class="stage-title" x="1032" y="132">Train toward a target</text>
  <text class="small" x="1032" y="158">Use the constructed field as a detached regression target.</text>

  <rect class="amber-card" x="1032" y="214" width="326" height="82" rx="18"/>
  <text class="math-small" x="1195" y="247" text-anchor="middle">V<tspan baseline-shift="sub" font-size="12">DrPO</tspan> = V<tspan baseline-shift="sub" font-size="12">pref</tspan> + λ<tspan baseline-shift="sub" font-size="12">ref</tspan>V<tspan baseline-shift="sub" font-size="12">ref</tspan></text>
  <text class="small" x="1195" y="272" text-anchor="middle">combine preference and reference drift</text>

  <rect class="amber-card" x="1032" y="348" width="326" height="86" rx="18" stroke-dasharray="8 7"/>
  <text class="math-small" x="1195" y="382" text-anchor="middle">ẑ<tspan baseline-shift="sub" font-size="12">i</tspan> = sg(z<tspan baseline-shift="sub" font-size="12">i</tspan> + η V<tspan baseline-shift="sub" font-size="12">DrPO</tspan>)</text>
  <text class="small" x="1195" y="409" text-anchor="middle">detached target, no reward backprop</text>

  <rect class="green-card" x="1032" y="486" width="326" height="82" rx="18"/>
  <text class="math-small" x="1195" y="520" text-anchor="middle">L = || z<tspan baseline-shift="sub" font-size="12">i</tspan> − ẑ<tspan baseline-shift="sub" font-size="12">i</tspan> ||<tspan baseline-shift="sub" font-size="12">2</tspan><tspan baseline-shift="super" font-size="12">2</tspan></text>
  <text class="small" x="1195" y="545" text-anchor="middle">update LoRA while preserving one-step inference</text>

  <path class="arrow-amber" d="M1195 296 L1195 340"/>
  <path class="arrow-amber" d="M1195 434 L1195 478"/>

  <path class="arrow-green" d="M362 472 C458 464 502 370 544 352"/>
  <path class="arrow-slate dashed" d="M334 646 C456 632 510 486 552 430"/>
  <path class="arrow-amber" d="M888 560 C950 516 970 314 1024 260"/>
  <path class="arrow-blue dashed" d="M362 362 C500 360 880 430 1024 504"/>
</svg>
